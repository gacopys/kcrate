services:

  # -----------------------------------------------------------------------
  # CrateDB 3-node cluster
  # -----------------------------------------------------------------------
  cratedb1:
    image: crate:6.2
    environment:
      CRATE_HEAP_SIZE: 1g
    command: >
      crate
      -Cnetwork.host=_site_
      -Cdiscovery.seed_hosts=cratedb2,cratedb3
      -Ccluster.initial_master_nodes=cratedb1,cratedb2,cratedb3
      -Cgateway.expected_data_nodes=3
      -Cgateway.recover_after_data_nodes=2
      -Cnode.name=cratedb1
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-sf"
        - "http://cratedb1:4200/_sql"
        - "-X"
        - "POST"
        - "-H"
        - "Content-Type: application/json"
        - "--data"
        - "{\"stmt\":\"SELECT count(*) FROM sys.nodes\"}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  cratedb2:
    image: crate:6.2
    environment:
      CRATE_HEAP_SIZE: 1g
    command: >
      crate
      -Cnetwork.host=_site_
      -Cdiscovery.seed_hosts=cratedb1,cratedb3
      -Ccluster.initial_master_nodes=cratedb1,cratedb2,cratedb3
      -Cgateway.expected_data_nodes=3
      -Cgateway.recover_after_data_nodes=2
      -Cnode.name=cratedb2
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-sf"
        - "http://cratedb2:4200/_sql"
        - "-X"
        - "POST"
        - "-H"
        - "Content-Type: application/json"
        - "--data"
        - "{\"stmt\":\"SELECT count(*) FROM sys.nodes\"}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  cratedb3:
    image: crate:6.2
    environment:
      CRATE_HEAP_SIZE: 1g
    command: >
      crate
      -Cnetwork.host=_site_
      -Cdiscovery.seed_hosts=cratedb1,cratedb2
      -Ccluster.initial_master_nodes=cratedb1,cratedb2,cratedb3
      -Cgateway.expected_data_nodes=3
      -Cgateway.recover_after_data_nodes=2
      -Cnode.name=cratedb3
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-sf"
        - "http://cratedb3:4200/_sql"
        - "-X"
        - "POST"
        - "-H"
        - "Content-Type: application/json"
        - "--data"
        - "{\"stmt\":\"SELECT count(*) FROM sys.nodes\"}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # -----------------------------------------------------------------------
  # Caddy load balancer
  # -----------------------------------------------------------------------
  caddy:
    build: ./caddy
    ports:
      - "4200:4200"
      - "5432:5432"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      cratedb1:
        condition: service_healthy
      cratedb2:
        condition: service_healthy
      cratedb3:
        condition: service_healthy
